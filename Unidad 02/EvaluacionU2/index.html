<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Cola de Impresión Circular</title>
    </head>
<body>

    <h1>Simulador de Cola de Impresión Circular</h1>

    <section>
        <h2>1. Enviar Documento a la Cola</h2>
        <form id="formularioDocumento">
            <label for="nombre">Nombre del Archivo:</label>
            <input type="text" id="nombre" placeholder="ej. Tesis_Final.pdf" required>
            <br><br>

            <label for="autor">Autor:</label>
            <input type="text" id="autor" placeholder="ej. Carlos Pérez" required>
            <br><br>

            <label for="tipo">Tipo de Documento:</label>
            <select id="tipo">
                <option value="PDF">PDF</option>
                <option value="Word">Word (.docx)</option>
                <option value="Imagen">Imagen (.png/.jpg)</option>
            </select>
            <br><br>

            <button type="submit">Agregar a la Cola (Encolar)</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>2. Acciones de la Impresora</h2>
        <button id="btnDesencolar">Imprimir Siguiente (Desencolar)</button>
        <button id="btnRecursivo" style="background-color: #ff9800; color: white;">Imprimir Todo (Recursivo)</button>
    </section>

    <hr>

    <section>
        <h2>3. Estado de la Memoria (Capacidad: 5)</h2>
        <p><strong>Frente (Front):</strong> <span id="txtFrente">-1</span> | <strong>Final (Rear):</strong> <span id="txtFinal">-1</span></p>
        
        <div id="contenedorMemoria" style="display: flex; gap: 10px; margin-top: 20px;">
            <div class="slot" id="slot-0" style="border: 2px dashed gray; padding: 15px; width: 100px; text-align: center;">[0]<br>Vacío</div>
            <div class="slot" id="slot-1" style="border: 2px dashed gray; padding: 15px; width: 100px; text-align: center;">[1]<br>Vacío</div>
            <div class="slot" id="slot-2" style="border: 2px dashed gray; padding: 15px; width: 100px; text-align: center;">[2]<br>Vacío</div>
            <div class="slot" id="slot-3" style="border: 2px dashed gray; padding: 15px; width: 100px; text-align: center;">[3]<br>Vacío</div>
            <div class="slot" id="slot-4" style="border: 2px dashed gray; padding: 15px; width: 100px; text-align: center;">[4]<br>Vacío</div>
        </div>
    </section>

    <hr>

    <section>
        <h2>4. Bitácora / Consola</h2>
        <div id="consolaImpresion" style="background-color: #222; color: #0f0; padding: 15px; font-family: monospace; min-height: 80px;">
            >> Impresora encendida y lista...
        </div>
    </section>

    <script src="documento.js"></script>
    <script src="colaImpresion.js"></script> <script src="app.js"></script>  </body>
</html>
